<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bondjoula Transport — Suivi GPS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0a0f0d;
    --surface: #111814;
    --card: #161d19;
    --border: #1e2b23;
    --green: #00e87a;
    --green-dim: #00e87a22;
    --amber: #f5a623;
    --amber-dim: #f5a62322;
    --red: #ff4545;
    --red-dim: #ff454522;
    --text: #e8f5ee;
    --muted: #5a7a65;
    --font-head: 'Syne', sans-serif;
    --font-mono: 'Space Mono', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-head); min-height: 100vh; display: flex; flex-direction: column; }

  /* HEADER */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px; border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--green); box-shadow: 0 0 10px var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .logo-text { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
  .logo-text span { color: var(--green); }
  .header-stats { display: flex; gap: 24px; }
  .stat-pill { display: flex; align-items: center; gap: 8px; background: var(--card); border: 1px solid var(--border); border-radius: 999px; padding: 6px 14px; font-family: var(--font-mono); font-size: 12px; }
  .stat-pill .dot { width: 7px; height: 7px; border-radius: 50%; }
  .dot-green { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot-amber { background: var(--amber); }
  .dot-red { background: var(--red); }
  #clock { font-family: var(--font-mono); font-size: 13px; color: var(--muted); }

  /* LAYOUT */
  .main { display: flex; flex: 1; height: calc(100vh - 61px); }

  /* SIDEBAR */
  .sidebar { width: 320px; min-width: 320px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-header { padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .sidebar-title { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .search-box { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; display: flex; align-items: center; gap: 8px; }
  .search-box input { background: none; border: none; color: var(--text); font-family: var(--font-head); font-size: 13px; outline: none; width: 100%; }
  .search-box input::placeholder { color: var(--muted); }
  .filter-tabs { display: flex; gap: 6px; margin-top: 10px; }
  .tab { padding: 4px 12px; border-radius: 999px; border: 1px solid var(--border); font-size: 11px; cursor: pointer; transition: all .2s; font-family: var(--font-mono); }
  .tab:hover { border-color: var(--green); color: var(--green); }
  .tab.active { background: var(--green-dim); border-color: var(--green); color: var(--green); }

  .vehicle-list { flex: 1; overflow-y: auto; padding: 8px 0; }
  .vehicle-list::-webkit-scrollbar { width: 4px; }
  .vehicle-list::-webkit-scrollbar-track { background: transparent; }
  .vehicle-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .vehicle-card {
    margin: 4px 12px; padding: 12px 14px; background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; cursor: pointer; transition: all .2s; position: relative; overflow: hidden;
  }
  .vehicle-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; border-radius: 3px 0 0 3px; }
  .vehicle-card.en_route::before { background: var(--green); }
  .vehicle-card.arrete::before { background: var(--amber); }
  .vehicle-card.hors_ligne::before { background: var(--red); }
  .vehicle-card:hover { border-color: var(--green); transform: translateX(2px); }
  .vehicle-card.selected { border-color: var(--green); background: var(--green-dim); }
  .vc-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
  .vc-name { font-size: 13px; font-weight: 700; line-height: 1.3; }
  .vc-status { font-size: 10px; font-family: var(--font-mono); padding: 2px 8px; border-radius: 999px; }
  .status-en_route { background: var(--green-dim); color: var(--green); }
  .status-arrete { background: var(--amber-dim); color: var(--amber); }
  .status-hors_ligne { background: var(--red-dim); color: var(--red); }
  .vc-matricule { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
  .vc-speed { font-family: var(--font-mono); font-size: 12px; color: var(--text); margin-top: 4px; }

  /* MAP */
  .map-wrapper { flex: 1; position: relative; }
  #map { width: 100%; height: 100%; }

  /* Map overlay info panel */
  .map-info {
    position: absolute; top: 16px; right: 16px; z-index: 1000;
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px; min-width: 220px; display: none;
  }
  .map-info.visible { display: block; }
  .info-title { font-size: 14px; font-weight: 700; margin-bottom: 8px; }
  .info-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 4px; font-family: var(--font-mono); }
  .info-row span:last-child { color: var(--text); }
  .info-close { position: absolute; top: 10px; right: 12px; cursor: pointer; color: var(--muted); font-size: 16px; }

  /* Config banner */
  .config-banner {
    position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
    z-index: 1000; background: var(--amber-dim); border: 1px solid var(--amber);
    border-radius: 10px; padding: 10px 20px; font-size: 12px; color: var(--amber);
    font-family: var(--font-mono); text-align: center; max-width: 400px;
  }

  /* Leaflet custom marker */
  .custom-marker { width: 32px; height: 32px; border-radius: 50%; border: 2px solid; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; font-family: var(--font-mono); cursor: pointer; }

  /* Responsive */
  @media (max-width: 700px) {
    .sidebar { width: 260px; min-width: 260px; }
    .header-stats { display: none; }
  }
</style>
</head>
<body>

<!-- ⚠️ CONFIGURATION : remplace ces deux valeurs par tes infos Supabase -->
<script>
  const SUPABASE_URL = 'https://kuzmahsgkgayrifexlle.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_1zxowvxoNSlFaAYEDNlDOw_CtEYuuui';
</script>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    <div class="logo-text">BONDJOULA <span>TRANSPORT</span></div>
  </div>
  <div class="header-stats">
    <div class="stat-pill"><div class="dot dot-green"></div><span id="count-route">0 en route</span></div>
    <div class="stat-pill"><div class="dot dot-amber"></div><span id="count-arrete">0 arrêtés</span></div>
    <div class="stat-pill"><div class="dot dot-red"></div><span id="count-offline">0 hors ligne</span></div>
  </div>
  <div id="clock"></div>
</header>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Flotte — 20 véhicules</div>
      <div class="search-box">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#5a7a65" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search" placeholder="Rechercher un bus...">
      </div>
      <div class="filter-tabs">
        <div class="tab active" onclick="filterBy('tous')">Tous</div>
        <div class="tab" onclick="filterBy('en_route')">En route</div>
        <div class="tab" onclick="filterBy('arrete')">Arrêtés</div>
        <div class="tab" onclick="filterBy('hors_ligne')">Hors ligne</div>
      </div>
    </div>
    <div class="vehicle-list" id="vehicle-list"></div>
  </div>

  <div class="map-wrapper">
    <div id="config-banner" class="config-banner" style="display:none">
      ⚠️ Configure tes clés Supabase dans le code — affichage en mode démo
    </div>
    <div id="map"></div>
    <div class="map-info" id="map-info">
      <span class="info-close" onclick="closeInfo()">✕</span>
      <div class="info-title" id="info-name"></div>
      <div class="info-row"><span>Matricule</span><span id="info-mat"></span></div>
      <div class="info-row"><span>Statut</span><span id="info-stat"></span></div>
      <div class="info-row"><span>Vitesse</span><span id="info-speed"></span></div>
      <div class="info-row"><span>Mise à jour</span><span id="info-time"></span></div>
      <div class="info-row"><span>Latitude</span><span id="info-lat"></span></div>
      <div class="info-row"><span>Longitude</span><span id="info-lng"></span></div>
    </div>
  </div>
</div>

<script>
// ─── HORLOGE ───
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}
setInterval(updateClock, 1000);
updateClock();

// ─── MAP LEAFLET ───
const map = L.map('map', { zoomControl: false }).setView([7.69, -5.03], 7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © Carto',
  maxZoom: 19
}).addTo(map);
L.control.zoom({ position: 'bottomright' }).addTo(map);

// ─── STATE ───
let vehicles = {};
let markers = {};
let selectedId = null;
let filterStatus = 'tous';
const supabaseReady = SUPABASE_URL.includes('VOTRE') === false;

// ─── COULEURS STATUT ───
const colors = { en_route: '#00e87a', arrete: '#f5a623', hors_ligne: '#ff4545' };
const labels = { en_route: 'En route', arrete: 'Arrêté', hors_ligne: 'Hors ligne' };

// ─── CRÉER MARQUEUR ───
function createMarker(v) {
  const color = colors[v.statut] || '#888';
  const icon = L.divIcon({
    className: '',
    html: `<div style="width:34px;height:34px;border-radius:50%;background:#111814;border:2.5px solid ${color};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:'Space Mono',monospace;color:${color};box-shadow:0 0 8px ${color}55;cursor:pointer">${v.num}</div>`,
    iconSize: [34, 34],
    iconAnchor: [17, 17]
  });
  const m = L.marker([v.lat, v.lng], { icon }).addTo(map);
  m.on('click', () => selectVehicle(v.id));
  return m;
}

// ─── RENDU LISTE ───
function renderList() {
  const search = document.getElementById('search').value.toLowerCase();
  const list = document.getElementById('vehicle-list');
  list.innerHTML = '';
  let counts = { en_route: 0, arrete: 0, hors_ligne: 0 };
  Object.values(vehicles).forEach(v => counts[v.statut] = (counts[v.statut] || 0) + 1);
  document.getElementById('count-route').textContent = `${counts.en_route || 0} en route`;
  document.getElementById('count-arrete').textContent = `${counts.arrete || 0} arrêtés`;
  document.getElementById('count-offline').textContent = `${counts.hors_ligne || 0} hors ligne`;

  Object.values(vehicles)
    .filter(v => filterStatus === 'tous' || v.statut === filterStatus)
    .filter(v => !search || v.nom.toLowerCase().includes(search) || v.matricule.toLowerCase().includes(search))
    .sort((a, b) => a.nom.localeCompare(b.nom))
    .forEach(v => {
      const card = document.createElement('div');
      card.className = `vehicle-card ${v.statut}${v.id === selectedId ? ' selected' : ''}`;
      card.innerHTML = `
        <div class="vc-top">
          <div class="vc-name">${v.nom}</div>
          <div class="vc-status status-${v.statut}">${labels[v.statut]}</div>
        </div>
        <div class="vc-matricule">${v.matricule}</div>
        <div class="vc-speed">⚡ ${v.vitesse ? Math.round(v.vitesse) + ' km/h' : '— km/h'}</div>
      `;
      card.onclick = () => selectVehicle(v.id);
      list.appendChild(card);
    });
}

// ─── SÉLECTIONNER VÉHICULE ───
function selectVehicle(id) {
  selectedId = id;
  const v = vehicles[id];
  if (!v) return;
  map.flyTo([v.lat, v.lng], 13, { duration: 1.2 });
  const info = document.getElementById('map-info');
  info.classList.add('visible');
  document.getElementById('info-name').textContent = v.nom;
  document.getElementById('info-mat').textContent = v.matricule;
  document.getElementById('info-stat').textContent = labels[v.statut];
  document.getElementById('info-speed').textContent = v.vitesse ? Math.round(v.vitesse) + ' km/h' : '—';
  document.getElementById('info-time').textContent = v.updated_at ? new Date(v.updated_at).toLocaleTimeString('fr-FR') : '—';
  document.getElementById('info-lat').textContent = v.lat.toFixed(5);
  document.getElementById('info-lng').textContent = v.lng.toFixed(5);
  renderList();
}

function closeInfo() {
  document.getElementById('map-info').classList.remove('visible');
  selectedId = null;
  renderList();
}

// ─── FILTRE ───
function filterBy(status) {
  filterStatus = status;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  renderList();
}

document.getElementById('search').addEventListener('input', renderList);

// ─── MODE DÉMO (positions simulées en Côte d'Ivoire) ───
const demoRoutes = [
  { id: 'd1', nom: 'Bus 01 - Bouaké → Abidjan', matricule: 'CI-1001-BK', statut: 'en_route', lat: 7.3, lng: -4.8, vitesse: 87 },
  { id: 'd2', nom: 'Bus 02 - Abidjan → Bouaké', matricule: 'CI-1002-BK', statut: 'en_route', lat: 6.5, lng: -5.2, vitesse: 92 },
  { id: 'd3', nom: 'Bus 03 - Bouaké → Yamoussoukro', matricule: 'CI-1003-BK', statut: 'arrete', lat: 6.82, lng: -5.27, vitesse: 0 },
  { id: 'd4', nom: 'Bus 04 - Yamoussoukro → Bouaké', matricule: 'CI-1004-BK', statut: 'en_route', lat: 6.95, lng: -5.15, vitesse: 76 },
  { id: 'd5', nom: 'Bus 05 - Bouaké → Korhogo', matricule: 'CI-1005-BK', statut: 'hors_ligne', lat: 8.1, lng: -5.4, vitesse: 0 },
  { id: 'd6', nom: 'Bus 06 - Korhogo → Bouaké', matricule: 'CI-1006-BK', statut: 'en_route', lat: 8.5, lng: -5.6, vitesse: 81 },
  { id: 'd7', nom: 'Bus 07 - Bouaké → Man', matricule: 'CI-1007-BK', statut: 'arrete', lat: 7.4, lng: -6.8, vitesse: 0 },
  { id: 'd8', nom: 'Bus 08 - Man → Bouaké', matricule: 'CI-1008-BK', statut: 'en_route', lat: 7.2, lng: -7.1, vitesse: 68 },
  { id: 'd9', nom: 'Bus 09 - Bouaké → Daloa', matricule: 'CI-1009-BK', statut: 'en_route', lat: 6.9, lng: -6.4, vitesse: 79 },
  { id: 'd10', nom: 'Bus 10 - Daloa → Bouaké', matricule: 'CI-1010-BK', statut: 'arrete', lat: 6.88, lng: -6.45, vitesse: 0 },
  { id: 'd11', nom: 'Bus 11 - Bouaké → Divo', matricule: 'CI-1011-BK', statut: 'en_route', lat: 5.84, lng: -5.36, vitesse: 83 },
  { id: 'd12', nom: 'Bus 12 - Divo → Bouaké', matricule: 'CI-1012-BK', statut: 'hors_ligne', lat: 5.83, lng: -5.37, vitesse: 0 },
  { id: 'd13', nom: 'Bus 13 - Bouaké → Abengourou', matricule: 'CI-1013-BK', statut: 'en_route', lat: 6.73, lng: -3.49, vitesse: 88 },
  { id: 'd14', nom: 'Bus 14 - Abengourou → Bouaké', matricule: 'CI-1014-BK', statut: 'arrete', lat: 6.72, lng: -3.5, vitesse: 0 },
  { id: 'd15', nom: 'Bus 15 - Bouaké → San-Pédro', matricule: 'CI-1015-BK', statut: 'en_route', lat: 5.9, lng: -6.3, vitesse: 74 },
  { id: 'd16', nom: 'Bus 16 - San-Pédro → Bouaké', matricule: 'CI-1016-BK', statut: 'en_route', lat: 4.75, lng: -6.64, vitesse: 91 },
  { id: 'd17', nom: 'Bus 17 - Bouaké → Odienné', matricule: 'CI-1017-BK', statut: 'hors_ligne', lat: 9.5, lng: -7.56, vitesse: 0 },
  { id: 'd18', nom: 'Bus 18 - Odienné → Bouaké', matricule: 'CI-1018-BK', statut: 'en_route', lat: 9.1, lng: -7.2, vitesse: 72 },
  { id: 'd19', nom: 'Bus 19 - Bouaké → Bondoukou', matricule: 'CI-1019-BK', statut: 'arrete', lat: 8.03, lng: -2.8, vitesse: 0 },
  { id: 'd20', nom: 'Bus 20 - Bondoukou → Bouaké', matricule: 'CI-1020-BK', statut: 'en_route', lat: 8.05, lng: -2.82, vitesse: 66 },
];

function loadDemo() {
  document.getElementById('config-banner').style.display = 'block';
  demoRoutes.forEach((v, i) => {
    v.num = i + 1;
    v.updated_at = new Date().toISOString();
    vehicles[v.id] = v;
    markers[v.id] = createMarker(v);
  });
  renderList();
  // Simulation mouvement léger
  setInterval(() => {
    Object.values(vehicles).forEach(v => {
      if (v.statut === 'en_route') {
        v.lat += (Math.random() - 0.5) * 0.005;
        v.lng += (Math.random() - 0.5) * 0.005;
        v.vitesse = 60 + Math.random() * 40;
        v.updated_at = new Date().toISOString();
        if (markers[v.id]) {
          markers[v.id].setLatLng([v.lat, v.lng]);
        }
        if (v.id === selectedId) selectVehicle(v.id);
      }
    });
    renderList();
  }, 3000);
}

// ─── MODE SUPABASE RÉEL ───
async function loadSupabase() {
  const { createClient } = supabase;
  const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Charger véhicules + positions actuelles
  const { data: vData } = await client.from('vehicules').select('*, chauffeurs(nom, prenom)');
  const { data: pData } = await client.from('positions_actuelles').select('*');

  const posMap = {};
  (pData || []).forEach(p => posMap[p.vehicule_id] = p);

  (vData || []).forEach((v, i) => {
    const pos = posMap[v.id] || { latitude: 7.69 + (Math.random()-0.5)*2, longitude: -5.03 + (Math.random()-0.5)*3, vitesse: 0 };
    const vehicle = {
      id: v.id, nom: v.nom, matricule: v.matricule,
      statut: v.statut, num: i + 1,
      lat: pos.latitude, lng: pos.longitude,
      vitesse: pos.vitesse,
      updated_at: pos.updated_at
    };
    vehicles[v.id] = vehicle;
    markers[v.id] = createMarker(vehicle);
  });
  renderList();

  // Écoute temps réel
  client.channel('positions-live')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'positions_actuelles' }, payload => {
      const p = payload.new;
      if (vehicles[p.vehicule_id]) {
        vehicles[p.vehicule_id].lat = p.latitude;
        vehicles[p.vehicule_id].lng = p.longitude;
        vehicles[p.vehicule_id].vitesse = p.vitesse;
        vehicles[p.vehicule_id].updated_at = p.updated_at;
        if (markers[p.vehicule_id]) {
          markers[p.vehicule_id].setLatLng([p.latitude, p.longitude]);
        }
        if (p.vehicule_id === selectedId) selectVehicle(p.vehicule_id);
        renderList();
      }
    })
    .subscribe();
}

// ─── INIT ───
if (supabaseReady) {
  loadSupabase();
} else {
  loadDemo();
}
</script>
</body>
</html>
